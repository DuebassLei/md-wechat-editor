<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>柠檬汽水 · 主题预览</title>
  <style>
    body { margin: 0; background: #fefce8; font-family: "PingFang SC", sans-serif; }
    .phone {
      max-width: 375px; margin: 0 auto; min-height: 100vh;
      background: #FFFEF5;
      box-shadow: 0 8px 32px rgb(250 204 21 / 0.2);
    }
    .bar {
      position: sticky; top: 0; z-index: 10;
      padding: 10px 14px;
      background: rgb(255 254 245 / 0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid #fde68a;
      font-size: 12px; color: #92702a;
    }
    .bar a { color: #ca8a04; text-decoration: none; font-weight: 600; }

    #nice {
      padding: 20px 0 48px;
      background-color: #FFFEF5;
      background-image:
        radial-gradient(circle at 14% 16%, rgb(253 224 71 / 0.28) 0, transparent 36%),
        radial-gradient(circle at 86% 82%, rgb(134 239 172 / 0.22) 0, transparent 32%);
      font-family: "PingFang SC", "Hiragino Sans GB", sans-serif;
      color: #4a4528; line-height: 1.85;
    }
    #nice p { margin: 1em 16px; font-size: 16px; color: #6b6538; }
    #nice h1 { margin: 0.5em 16px 1.1em; text-align: center; }
    #nice h1 .prefix::before { content: "🍋 "; }
    #nice h1 .suffix::after { content: " ✨"; }
    #nice h1 .content {
      display: inline; font-size: 20px; font-weight: 800; color: #a16207;
      background: linear-gradient(transparent 65%, rgb(253 224 71 / 0.5) 65%);
    }
    #nice h1 .prefix, #nice h1 .suffix { display: inline; font-size: 18px; }

    #nice h2 { margin: 1.85em 16px 0.75em; text-align: center; }
    #nice h2 .content {
      display: inline-block; font-size: 17px; font-weight: 700; color: #fff;
      padding: 0.35em 1.2em;
      background: linear-gradient(135deg, #facc15 0%, #86efac 100%);
      border-radius: 999px;
      box-shadow: 0 4px 0 #ca8a04, 0 5px 14px rgb(202 138 4 / 0.2);
    }
    #nice h2 .prefix, #nice h2 .suffix { display: none; }

    #nice h3 .prefix::before { content: "♡ "; color: #eab308; }
    #nice h3 .content { font-size: 16px; font-weight: 700; color: #854d0e; }
    #nice h3 .suffix { display: none; }

    #nice blockquote {
      margin: 1.3em 16px; padding: 1em 1.05em;
      border-radius: 18px 18px 18px 4px;
      border: 2px solid #fde68a; background: #fff; color: #92702a;
      box-shadow: 4px 4px 0 rgb(253 224 71 / 0.4);
    }
    #nice blockquote p { margin: 0; font-size: 15px; }

    #nice strong { color: #ca8a04; font-weight: 700; background: rgb(254 249 195 / 0.65); padding: 0 5px; border-radius: 6px; }
    #nice em { color: #16a34a; font-style: normal; }
    #nice a { color: #ca8a04; text-decoration: wavy underline #fde68a; }

    #nice ul, #nice ol { margin: 1em 16px 1em 28px; }
    #nice li { margin: 0.5em 0; }
    #nice li::marker { content: "🫧 "; }

    #nice hr { border: none; text-align: center; margin: 2em 16px; height: auto; background: none; }
    #nice hr::before { content: "· · · 🍋 · · ·"; color: #fde68a; font-size: 14px; letter-spacing: 0.25em; }

    #nice p code, #nice li code {
      padding: 2px 8px; background: #fefce8; color: #854d0e;
      font-family: "JetBrains Mono", monospace; font-size: 0.88em;
      border-radius: 8px; border: 1px dashed #fde68a;
    }
    #nice pre {
      margin: 1.2em 16px; padding: 1em; background: #fefce8;
      border: 2px solid #fde68a; border-radius: 14px; font-size: 13px; overflow-x: auto;
    }

    #nice table {
      width: calc(100% - 32px); margin: 1.2em 16px;
      border-collapse: separate; border-spacing: 0;
      border-radius: 14px; overflow: hidden; border: 2px solid #fde68a; font-size: 14px;
    }
    #nice th { background: #fde68a; color: #854d0e; padding: 10px 8px; }
    #nice td { padding: 10px 8px; background: #fff; border-top: 1px solid #fef9c3; }
  </style>
</head>
<body>
  <div class="phone">
    <div class="bar"><a href="index.html">← 全部草案</a> · 柠檬汽水</div>
    <section id="nice">
      <h1><span class="prefix"></span><span class="content">夏日续命：自制气泡柠檬茶</span><span class="suffix"></span></h1>

      <p>柠檬款是软萌系列的<strong>清爽向</strong>：黄绿撞色像汽水气泡，适合夏天、户外、轻活动类内容。</p>

      <blockquote><p>可爱也可以很精神——像第一口冰汽水那样亮。</p></blockquote>

      <h2><span class="prefix"></span><span class="content">制作步骤</span><span class="suffix"></span></h2>

      <h3><span class="prefix"></span><span class="content">基底</span><span class="suffix"></span></h3>
      <p>半颗鲜柠檬捣出汁，加<em>苏打水</em>至八分满。冰块用透明杯最上镜。</p>

      <h3><span class="prefix"></span><span class="content">点缀</span><span class="suffix"></span></h3>
      <p>薄荷一叶 + 柠檬片挂杯。更多配方见 <a href="#">夏日特辑</a>。</p>

      <ul>
        <li>黄绿渐变 h2 胶囊</li>
        <li>气泡 emoji 列表 marker</li>
        <li>引文贴纸阴影同系列</li>
      </ul>

      <hr>

      <pre><code>🍋 lemon: 0.5
🫧 soda: fill
❄️ ice: yes</code></pre>

      <table>
        <tr><th>口味</th><th>清爽度</th></tr>
        <tr><td>青柠</td><td>⭐⭐⭐⭐⭐</td></tr>
        <tr><td>蜂蜜</td><td>⭐⭐⭐⭐☆</td></tr>
      </table>

      <p>软萌系列「活力色」：比粉色更跳、比咖色更轻。</p>
    </section>
  </div>
</body>
</html>
