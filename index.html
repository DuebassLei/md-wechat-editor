<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="墨韵简排 — Markdown 微信排版工具，实时预览、一键复制公众号 HTML。"
    />
    <title>墨韵简排 · Markdown 微信排版工具</title>
    <link rel="icon" type="image/png" href="%BASE_URL%logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&family=Noto+Sans+SC:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        var theme = localStorage.getItem('moyun-jianpai-app-theme') || 'default'
        document.documentElement.setAttribute('data-app-theme', theme)
        var scheme = localStorage.getItem('moyun-jianpai-color-scheme') || 'system'
        var dark =
          scheme === 'dark' ||
          (scheme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)
        document.documentElement.setAttribute('data-color-scheme', dark ? 'dark' : 'light')
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
